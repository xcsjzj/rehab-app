<title>肌骨康复速查 V6.0</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root {
  /* 医疗专业配色 - 基于NHS/Material Design 3研究 */
  --primary: #0d6e8c;           /* 深青蓝 - 信任与专业 */
  --primary-light: #4a9fb8;     /* 浅青蓝 */
  --primary-dark: #085066;      /* 深暗青蓝 */
  --secondary: #0ea5e9;
  --success: #059669;           /* 柔和绿 - 正常状态 */
  --success-light: #d1fae5;
  --warning: #d97706;           /* 暖琥珀 - CTA与提醒 */
  --warning-light: #fef3c7;
  --danger: #dc2626;            /* 警示红 - 仅用于紧急/错误 */
  --danger-light: #fee2e2;
  --info: #0891b2;              /* 信息青 */
  --text-1: #1a1a1a;            /* 主文本 - 高对比度 */
  --text-2: #4a5568;            /* 次文本 */
  --text-3: #94a3b8;            /* 辅助文本 */
  --bg-1: #faf8f5;              /* 暖白背景 - 非纯白 */
  --bg-2: #fffcf8;              /* 卡片背景 - 微暖白 */
  --bg-3: #f0ede8;              /* 分区背景 - 暖灰 */
  --border: #e2ddd5;            /* 暖色边框 */
  --radius-sm: 10px;
  --radius-md: 14px;
  --radius-lg: 18px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px -2px rgba(0,0,0,0.08);
  --shadow-lg: 0 12px 20px -5px rgba(0,0,0,0.1);
  --tab-height: 64px;
  --nav-height: 56px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  /* 等宽数字字体 - 用于数据展示 */
  --font-mono: 'SF Mono', 'Roboto Mono', 'Menlo', 'Consolas', monospace;
}
html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', Arial, sans-serif; font-size: 16px; color: var(--text-1); background: var(--bg-1); line-height: 1.7; -webkit-text-size-adjust: 100%; width: 100%; max-width: 100%; -webkit-font-smoothing: antialiased; }
body { display: flex; flex-direction: column; width: 100%; max-width: 100%; margin: 0; padding: 0; }

.navbar {
  height: calc(var(--nav-height) + var(--safe-top));
  padding-top: var(--safe-top);
  background: var(--bg-2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-left: 16px;
  padding-right: 16px;
  position: relative;
  z-index: 100;
  flex-shrink: 0;
  box-shadow: 0 1px 2px rgba(0,0,0,0.03);
}
.navbar-title { font-size: 18px; font-weight: 600; text-align: center; flex: 1; letter-spacing: -0.3px; }
.navbar-left, .navbar-right { width: 52px; height: 52px; display: flex; align-items: center; justify-content: center; }
.nav-btn { width: 52px; height: 52px; display: flex; align-items: center; justify-content: center; border: none; background: none; cursor: pointer; color: var(--text-1); border-radius: 50%; }
.nav-btn:active { background: var(--bg-3); }
.nav-btn .icon { width: 28px; height: 28px; }
.nav-btn .icon svg { width: 100%; height: 100%; }

.content {
  flex: 1 1 0;
  min-height: 0;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  position: relative;
}
.page { display: none; padding: 18px; padding-bottom: calc(var(--tab-height) + var(--safe-bottom) + 24px); }
.page.active { display: block; animation: fadeIn 0.2s ease; }

.tabbar {
  height: calc(var(--tab-height) + var(--safe-bottom));
  padding-bottom: var(--safe-bottom);
  background: var(--bg-2);
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-around;
  align-items: center;
  flex-shrink: 0;
  position: sticky;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 100;
  box-shadow: 0 -2px 8px rgba(0,0,0,0.04);
}
.tab-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  padding: 8px 0;
  cursor: pointer;
  color: var(--text-3);
  font-size: 11px;
  transition: color 0.2s;
  min-height: 48px;
  -webkit-tap-highlight-color: transparent;
}
.tab-item.active { color: var(--primary); font-weight: 600; }
.tab-item .icon { width: 24px; height: 24px; }
.tab-item .icon svg { width: 100%; height: 100%; }

/* 等宽数字 - 用于所有数据值 */
.mono, .stat-card-value, .result-score, .history-card-score, .scale-score-display, .rank-count, .dist-count, .avg-score-value {
  font-family: var(--font-mono);
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.5px;
}

/* 琥珀色CTA按钮 */
.btn-primary { background: var(--warning); color: #fff; }
.btn-primary:active { background: #b45309; }

/* 搜索自动补全下拉 */
.autocomplete-dropdown {
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 0 0 var(--radius-md) var(--radius-md);
  margin-top: -1px;
  max-height: 280px;
  overflow-y: auto;
  z-index: 200;
  box-shadow: var(--shadow-md);
  display: none;
}
.autocomplete-dropdown.show { display: block; }
.autocomplete-header {
  padding: 8px 16px;
  font-size: 12px;
  color: var(--text-3);
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--border);
}
.autocomplete-clear { color: var(--primary); cursor: pointer; font-size: 13px; }
.autocomplete-item {
  padding: 12px 16px;
  font-size: 15px;
  color: var(--text-1);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid var(--border);
}
.autocomplete-item:last-child { border-bottom: none; }
.autocomplete-item:active { background: var(--bg-3); }
.autocomplete-item .icon { width: 18px; height: 18px; color: var(--text-3); flex-shrink: 0; }
.autocomplete-item .icon svg { width: 100%; height: 100%; }
.autocomplete-item mark {
  background: var(--warning-light);
  color: var(--warning);
  border-radius: 2px;
  padding: 0 2px;
}

/* 搜索历史 */
.search-history-section { padding: 4px 0; }
.search-history-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 6px 12px;
  margin: 3px;
  background: var(--bg-3);
  border-radius: 16px;
  font-size: 13px;
  color: var(--text-2);
  cursor: pointer;
}
.search-history-tag:active { background: var(--border); }
.search-history-tag .icon { width: 14px; height: 14px; color: var(--text-3); }

/* 红旗不可关闭警报 */
.redflag-alert {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: var(--bg-2);
  border-radius: var(--radius-lg);
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  z-index: 2000;
  width: 90%;
  max-width: 400px;
  display: none;
}
.redflag-alert.show { display: block; animation: scaleIn 0.2s ease; }
.redflag-alert-mask {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6);
  z-index: 1999;
  display: none;
}
.redflag-alert-mask.show { display: block; }
.redflag-alert-header {
  background: var(--danger);
  color: #fff;
  padding: 20px;
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  text-align: center;
}
.redflag-alert-icon { font-size: 40px; margin-bottom: 8px; }
.redflag-alert-title { font-size: 18px; font-weight: 700; }
.redflag-alert-body { padding: 20px; }
.redflag-alert-content { font-size: 15px; color: var(--text-2); line-height: 1.7; }
.redflag-alert-footer { padding: 0 20px 20px; }
.redflag-alert-btn {
  width: 100%;
  padding: 14px;
  background: var(--danger);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
}

/* 渐进式披露 */
.progress-indicator {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 12px 0;
}
.progress-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--border);
  transition: all 0.2s;
}
.progress-dot.active { background: var(--primary); width: 24px; border-radius: 4px; }
.progress-dot.completed { background: var(--success); }

/* 三层信息架构 */
.info-layer-summary {
  background: var(--bg-2);
  border-radius: var(--radius-md);
  padding: 20px;
  margin-bottom: 12px;
  box-shadow: var(--shadow-sm);
  text-align: center;
}
.info-layer-summary-label { font-size: 13px; color: var(--text-3); margin-bottom: 6px; }
.info-layer-summary-value { font-size: 28px; font-weight: 700; }
.info-layer-detail {
  background: var(--bg-2);
  border-radius: var(--radius-md);
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: var(--shadow-sm);
}
.info-layer-explain {
  background: var(--info-bg, #ecfeff);
  border-left: 3px solid var(--info);
  padding: 14px 16px;
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  font-size: 14px;
  color: var(--text-2);
  line-height: 1.7;
  margin-bottom: 12px;
}

@keyframes scaleIn {
  from { transform: translate(-50%, -50%) scale(0.9); opacity: 0; }
  to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
}

.search-box {
  background: var(--bg-3);
  border-radius: var(--radius-md);
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
  position: relative;
}
.search-box .icon { width: 24px; height: 24px; color: var(--text-3); flex-shrink: 0; }
.search-box .icon svg { width: 100%; height: 100%; }
.search-box input {
  flex: 1;
  border: none;
  background: transparent;
  outline: none;
  font-size: 18px;
  color: var(--text-1);
}
.search-box input::placeholder { color: var(--text-3); }

mark {
  background: rgba(245, 158, 11, 0.3);
  color: inherit;
  padding: 0 2px;
  border-radius: 2px;
}

.search-history-dropdown {
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  margin-top: 8px;
  padding: 8px 0;
  z-index: 100;
  box-shadow: var(--shadow-md);
  max-height: 200px;
  overflow-y: auto;
}
.search-history-item {
  padding: 10px 16px;
  cursor: pointer;
  font-size: 14px;
  color: var(--text-2);
  display: flex;
  align-items: center;
  gap: 8px;
}
.search-history-item:hover { background: var(--bg-3); }
.search-history-item .icon { width: 16px; height: 16px; color: var(--text-3); }
.search-history-header {
  padding: 8px 16px;
  font-size: 12px;
  color: var(--text-3);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.search-history-clear { color: var(--primary); cursor: pointer; }

.section-title {
  font-size: 19px;
  font-weight: 600;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-title .icon { width: 26px; height: 26px; color: var(--primary); }
.section-title .icon svg { width: 100%; height: 100%; }

.body-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 24px;
}
.body-card {
  background: var(--bg-2);
  border: 2px solid transparent;
  border-radius: var(--radius-md);
  padding: 20px 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  box-shadow: var(--shadow-sm);
  transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.2s ease, border-color 0.2s ease;
  text-align: center;
  min-height: 100px;
}
.body-card:hover { transform: scale(1.02); box-shadow: var(--shadow-md); }
.body-card:active { transform: scale(0.95); box-shadow: var(--shadow-md); }
.body-card.active { background: var(--primary); border: 2px solid var(--primary); }
.body-card.active .icon { color: #fff; }
.body-card.active .body-card-name { color: #fff; }
.body-card.active .body-card-count { color: rgba(255,255,255,0.85); }
.body-card .icon { width: 48px; height: 48px; color: var(--primary); transition: color 0.2s; }
.body-card .icon svg { width: 100%; height: 100%; }
.body-card-name { font-size: 16px; font-weight: 500; color: var(--text-1); line-height: 1.3; transition: color 0.2s; }
.body-card-count { font-size: 13px; color: var(--text-3); transition: color 0.2s; }

.list-item {
  background: var(--bg-2);
  border-radius: var(--radius-md);
  padding: 18px 16px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  box-shadow: var(--shadow-sm);
  transition: transform 0.15s ease, box-shadow 0.15s ease;
  min-height: 56px;
}
.list-item:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.list-item:active { transform: scale(0.98); }
.list-item .icon { width: 44px; height: 44px; color: var(--primary); flex-shrink: 0; }
.list-item .icon svg { width: 100%; height: 100%; }
.list-item-content { flex: 1; min-width: 0; }
.list-item-title { font-size: 18px; font-weight: 500; color: var(--text-1); margin-bottom: 4px; }
.list-item-desc { font-size: 15px; color: var(--text-2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.list-item-arrow { color: var(--text-3); flex-shrink: 0; }
.list-item-arrow .icon { width: 24px; height: 24px; }
.list-item-arrow .icon svg { width: 100%; height: 100%; }

.detail-header {
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  color: white;
  padding: 28px 20px;
  border-radius: 0 0 var(--radius-lg) var(--radius-lg);
  margin: -18px -18px 20px -18px;
}
.detail-header-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; line-height: 1.3; }
.detail-header-sub { font-size: 14px; opacity: 0.85; line-height: 1.5; }
.detail-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
.detail-tag { background: rgba(255,255,255,0.2); padding: 5px 12px; border-radius: 16px; font-size: 13px; }

.quick-nav {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 12px;
  margin-bottom: 4px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.quick-nav::-webkit-scrollbar { display: none; }
.quick-nav-item {
  flex-shrink: 0;
  padding: 10px 18px;
  background: var(--bg-2);
  border-radius: 20px;
  font-size: 15px;
  color: var(--text-2);
  cursor: pointer;
  white-space: nowrap;
  border: 1px solid var(--border);
  transition: all 0.2s;
  min-height: 40px;
  display: flex;
  align-items: center;
}
.quick-nav-item.active { background: var(--primary); color: white; border-color: var(--primary); }

.accordion-item {
  background: var(--bg-2);
  border-radius: var(--radius-md);
  margin-bottom: 12px;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.accordion-header {
  padding: 16px 18px;
  display: flex;
  flex-direction: column;
  align-items: stretch;
  gap: 8px;
  cursor: pointer;
  transition: background 0.2s;
  min-height: 56px;
}
.accordion-header:active { background: var(--bg-3); }
.accordion-header-top {
  display: flex;
  align-items: center;
  gap: 12px;
}
.accordion-header .icon { width: 28px; height: 28px; color: var(--primary); flex-shrink: 0; }
.accordion-header .icon svg { width: 100%; height: 100%; }
.accordion-title { flex: 1; font-size: 18px; font-weight: 500; line-height: 1.4; }
.accordion-chevron { width: 24px; height: 24px; color: var(--text-3); transition: transform 0.3s; flex-shrink: 0; }
.accordion-chevron svg { width: 100%; height: 100%; }
.accordion-item.open .accordion-chevron { transform: rotate(180deg); }
.accordion-preview { font-size: 13px; color: var(--text-3); padding-left: 40px; line-height: 1.4; }
.accordion-item.open .accordion-preview { display: none; }
.accordion-item[data-section="redflag"] .accordion-header { background: rgba(239,68,68,0.06); }
.accordion-item[data-section="redflag"] .accordion-header .icon { color: #ef4444; }
.accordion-item[data-section="redflag"] .accordion-title { color: #dc2626; }
.accordion-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
}
.accordion-item.open .accordion-body { max-height: 5000px; }
.accordion-content { padding: 0 16px 20px 16px; color: var(--text-2); font-size: 16px; line-height: 1.8; }
.accordion-content p { margin-bottom: 12px; }
.accordion-content ul, .accordion-content ol { padding-left: 22px; margin-bottom: 12px; }
.accordion-content li { margin-bottom: 6px; line-height: 1.7; }
.accordion-content .sub-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-1);
  margin: 14px 0 10px 0;
  padding: 8px 12px;
  background: var(--bg-3);
  border-radius: var(--radius-sm);
  border-left: 3px solid var(--primary);
}
.accordion-content .divider {
  height: 1px;
  background: var(--border);
  margin: 12px 0;
}
.field-row {
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: 14px 14px;
  margin-bottom: 8px;
  background: var(--bg-1);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
}
.field-row:last-child { margin-bottom: 0; }
.field-label { color: var(--primary); font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.field-value { color: var(--text-1); font-size: 16px; line-height: 1.7; }
.field-value p { margin-bottom: 8px; }
.field-value p:last-child { margin-bottom: 0; }

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 16px 28px;
  border-radius: var(--radius-md);
  font-size: 17px;
  font-weight: 500;
  border: none;
  cursor: pointer;
  transition: all 0.15s ease;
  min-height: 52px;
  position: relative;
}
.btn:active { transform: scale(0.95); }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:active { background: var(--primary-dark); }
.btn-outline { background: transparent; color: var(--primary); border: 1px solid var(--primary); }
.btn-outline:active { background: rgba(37, 99, 235, 0.1); }
.btn-block { width: 100%; }
.btn .icon { width: 22px; height: 22px; }
.btn .icon svg { width: 100%; height: 100%; }

.btn-row { display: flex; gap: 12px; margin-bottom: 18px; }
.btn-row .btn { flex: 1; padding: 14px 16px; font-size: 16px; }

.empty {
  text-align: center;
  padding: 48px 20px;
  color: var(--text-3);
}
.empty .icon { width: 56px; height: 56px; margin: 0 auto 16px; opacity: 0.5; }
.empty .icon svg { width: 100%; height: 100%; }

.scale-category { margin-bottom: 20px; }
.scale-category-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-2);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.scale-category-title .icon { width: 22px; height: 22px; color: var(--primary); }
.scale-category-title .icon svg { width: 100%; height: 100%; }

.text-primary { color: var(--primary); }
.text-success { color: var(--success); }
.text-warning { color: var(--warning); }
.text-danger { color: var(--danger); }
.mt-16 { margin-top: 16px; }
.mb-16 { margin-bottom: 16px; }
.flex { display: flex; }
.items-center { align-items: center; }
.gap-8 { gap: 8px; }

(function() {
  var _loadErrors = { count: 0, files: [] };
  window._appLoadErrors = _loadErrors;

  window.addEventListener('error', function(e) {
    _loadErrors.count++;
    if (e.target && e.target.src) {
      _loadErrors.files.push(e.target.src);
    }
    var loading = document.getElementById('appLoading');
    if (loading) {
      var isJsError = e.target && e.target.tagName === 'SCRIPT';
      if (isJsError || (e.message && e.message.indexOf('Script error') === -1)) {
        var msg = '资源加载失败';
        if (isJsError && e.target.src) {
          var fname = e.target.src.split('/').pop();
          msg = '数据文件加载失败：' + fname;
        }
        loading.innerHTML = '<div style="padding:24px;text-align:center;max-width:320px;">' +
          '<div style="font-size:40px;margin-bottom:12px;">⚠️</div>' +
          '<div style="font-size:16px;font-weight:600;color:var(--text-1);margin-bottom:8px;">' + msg + '</div>' +
          '<div style="font-size:13px;color:var(--text-3);line-height:1.6;margin-bottom:16px;">' +
          '请检查网络连接后，点击下方按钮重试' +
          '</div>' +
          '<button onclick="location.reload()" style="padding:12px 32px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-size:15px;cursor:pointer;">重新加载</button>' +
          '</div>';
      }
    }
  }, true);

  window.addEventListener('unhandledrejection', function(e) {
    console.warn('未处理的Promise错误:', e.reason);
  });
})();
</script>

        console.log('Service Worker 已更新到版本:', e.data.version);
      }
    });
  });
}
</script>
